# Application Configuration
quarkus.application.name=incentive
quarkus.application.version=1.0.0

# Server Configuration
quarkus.http.limits.max-body-size=100M
quarkus.http.1cors=true
quarkus.http.cors.headers=Content-Disposition,Origin,Accept,X-Requested-With,Access-Control-Allow-Origin, Access-Control-Request-Method, Access-Control-Request-Headers,Content-Type,share,X-Forwarded-For,Access-Control-Allow-Headers,X-Real-IP,HTTP_X_Real_IP,Location,Authorization,X-Total-Count,x-total-pages
quarkus.http.cors.exposed-headers=Content-Disposition,Origin,Accept,X-Requested-With,Access-Control-Allow-Origin, Access-Control-Request-Method, Access-Control-Request-Headers,Content-Type,share,X-Forwarded-For,Access-Control-Allow-Headers,X-Real-IP,HTTP_X_Real_IP,Location,Authorization,X-Total-Count,x-total-pages
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS,HEAD,PATCH
quarkus.http.cors.origins=*

quarkus.http.port=8080

# Database Configuration - PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/incentive_db
quarkus.datasource.jdbc.max-size=16

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-version=1.0.0

# JWT Configuration
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://incentive.com
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem
quarkus.smallrye-jwt.enabled=true

# JWT Token expiration (1 day = 86400 seconds)
jwt.duration=86400

# Project Hash Configuration (AES-128 requires 16 characters)
project.hash.secret=Ch4ng3M3Pr0duct1

# Mailer Configuration - Gmail SMTP
quarkus.mailer.from=noreply@incentive.com
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=your-email@gmail.com
quarkus.mailer.password=your-app-password

# Email templates
email.verification.subject=Verifique seu email - Incentive
email.statement.subject=Seu extrato mensal - Incentive

# Scheduler Configuration
quarkus.scheduler.enabled=true

# OpenAPI/Swagger Configuration
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.info-title=Incentive API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API para sistema de incentivo a doações
quarkus.smallrye-openapi.info-contact-email=contato@incentive.com

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."org.example.incentive".level=DEBUG

# Dev Services - Disable in production
%dev.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.devservices.enabled=true

# Security Configuration - lazy auth lets JAX-RS annotations (@PermitAll, @RolesAllowed) handle security
quarkus.http.auth.proactive=false

# Validation Configuration
quarkus.hibernate-validator.fail-fast=false

# Card encryption key (32 hex chars = 16 bytes AES-128) — keep in sync with VITE_CARD_ENCRYPTION_KEY
card.encryption.key=4d61726375734950494163727970743f
