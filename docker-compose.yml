version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: incentive-postgres
    environment:
      POSTGRES_DB: incentive_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: Adminer para gerenciar o banco
  adminer:
    image: adminer:latest
    container_name: incentive-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
